<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link type="text/css" rel="stylesheet" href="css/main.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/header.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/menu.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/location.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/buscador.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/custom.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/homestyle.css" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/responsiveStyle.css?v1.01" media="screen,projection" />
  <link type="text/css" rel="stylesheet" href="css/themecolor.css" media="screen,projection" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jura&family=Orbitron&family=Oswald&display=swap');
  </style>
  <link rel="icon" type="image/x-icon" href="/img/wms.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/encabezado.js" type="text/javascript"></script>
  <title>Ingresar Códigos de Barra - WMS</title>
</head>

<body id="home">
  <my-header></my-header>
  <main class="container">
    <div id="contenedorLoader"></div>
    <!-- <div id="resultadoBusqueda"> -->
    <div id="resultadoBusqueda" class="card-panel z-depth-2" style="margin-top: 20px; border-radius: 8px;">
      <h2 class="center-align" style="text-transform: uppercase; font-size: 2rem;">Ingresar Código de Barras</h2>

      <div class="row">
        <div class="col s12">
          <div class="switch">
            <label>
              Artículo
              <input type="checkbox" id="arti_Kit">
              <span class="lever"></span>
              Kit o Caja
            </label>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">inventory_2</i>
          <input id="pArticulo" type="text" class="validate" autocomplete="off">
          <label for="pArticulo">Código de Artículo</label>
        </div>
        <div class="input-field col s12 m6">
          <select id="selectBarcodes">
            <option value="" disabled selected>Seleccione un código</option>
          </select>
          <label>Códigos de Barra Asociados</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">qr_code_scanner</i>
          <input id="pCodigoBarra" type="text" class="validate" autocomplete="off">
          <label for="pCodigoBarra">Nuevo Código de Barra</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">lock</i>
          <input id="autorizacion" type="password" class="validate" autocomplete="off">
          <label for="autorizacion">Clave de Autorización</label>
        </div>
      </div>
      <div class="row">
        <div class="col s12">
          <button id="btnCodBarras" class="btn waves-effect waves-light btn-large w100" onclick="InsertaCodigoBarra()">
            Ingresar <i class="material-icons right">send</i>
          </button>
        </div>
      </div>
    </div>
  </main>
  <!-- <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script> -->
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="text/javascript" src="js/environment.js?v1.1" defer></script>
  <script type="text/javascript" src="js/main.js?v1.1" defer></script>
  <script type="text/javascript" src="js/menu.js?v1.1" defer></script>
  <script type="text/javascript" src="js/ingresaCodigoBarras.js?v1.1" defer></script>
  <script type="text/javascript" src="js/loader.js"></script>
  <script type="tex/javascript" src="js/paginacion.js"></script>
</body>

</html>
